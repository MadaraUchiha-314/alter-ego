# .the-loop/config.yaml
# Generated by `/the-loop:init`. Validated against .the-loop/config.schema.json.
# A subset of these keys can be overridden per work-item in the YAML front-matter
# of the work-item / spec markdown.

version: "0.1.0"

ticketing:
  system: github
  github:
    owner: "MadaraUchiha-314"
    repo: "alter-ego"
    useProjects: true

repository:
  monorepo: false        # TODO: verify — no signal found (no nx.json/workspaces present), defaulted
  monorepoTool: none
  runScriptsFromRoot: true

workflow:
  specApproach: kiro-3-phase
  requireHumanReviewPerPhase: true
  specDir: docs/specs
  capabilitiesDir: docs/capabilities
  phaseLabelPrefix: "loop:"
  phases:
    - not-started
    - brainstorming
    - requirements-definition
    - design
    - tasks-breakdown
    - implementation
    - needs-review
    - complete

tooling:
  languages: []           # TODO: verify — no source files present yet to detect a language from
  packageManager:
    python: uv
    ts: bun
    go: go
  unitTest:
    python: pytest
    ts: vitest
    go: go test
  integrationTest:
    python: pytest
    ts: playwright
    go: go test
  lint:
    python: ruff
    ts: oxlint
    go: golangci-lint
    markdown: markdownlint
  typeCheck:
    python: pyright
    ts: tsc
    go: go build
  release:
    ts: npm
    python: pypi
    go: go-modules
    containers: ghcr

testing:
  gherkinDocstrings: required
  linkRequirements: true
  integrationTestGlobs: []

apiSpecs:
  rest:
    dir: specs/openapi
    format: openapi-3.1
    generateDocs: true
    docsTool: redocly
  graphql:
    dir: specs/graphql
    schemaFormat: sdl
    generateDocs: true
    docsTool: spectaql

design:
  uiArtifacts:
    dir: design
    format: html
    selfContained: true
    screenshotEvidence: true

localOrchestration:
  containerRuntime: podman
  linkPackagesLocally: true
  remoteServices: []

hooks:
  preCommit: [lint, typecheck, unit-test]
  prePush: [lint, typecheck, unit-test]
  commitConvention: conventional-commits

observability:
  devLevel: debug
  runtimeLevel: info
  browserLogging: chrome-devtools-mcp

reviews:
  selfReviewCount: 3
  criticReviewCount: 3
  stopOnNoNewFindings: true
  escalateOnRepeatFinding: true
  critics: []

autonomy:
  defaultTier: 3
  inferFromChange: true
  sensitivePaths: []
  tiers:
    "1": autonomous-complete
    "2": autonomous-complete
    "3": human-approves-pr
    "4": human-approves-pr
    "5": human-approves-spec-and-pr

tdd:
  mode: standard

minimalism:
  enabled: true
  intensity: standard

selfImprovement:
  enabled: true
  maxIndexLines: 200
  writeGateOccurrences: 3

userInteraction:
  diagramFormat: mermaid
  prSummary:
    required: true
    templatePath: .the-loop/templates/pr-briefing.md
    condensed: true
    includeDiagrams: true
    documentInsightsAndDecisions: true
  educateUser: true

personas: []
  # - handle: "@MadaraUchiha-314"
  #   kind: individual
  #   roles: [product-manager, architect, engineer, approver]

messaging:
  channels: []
  # - type: slack
  #   target: "#the-loop"

externalTools:
  referenceFile: .the-loop/external-tools.md

webhooks:
  ghWebhook:
    host: 127.0.0.1
    port: 8787
    path: /gh-webhook
    secretEnv: THE_LOOP_GH_WEBHOOK_SECRET
    pidfile: .the-loop/gh-webhook.pid
    events: []
    routing:
      enabled: false
      registryDir: .the-loop/sessions
      defaultHarness: claude
      spawnOnUnmatched: labeled
      autoExecuteLabel: "the-loop: auto-execute"
      spawnWorkdir: "."
      maxConcurrentDispatches: 4
      dedupCacheSize: 1024
      dispatchTimeoutSeconds: 1800
      promptTemplate: .the-loop/templates/webhook-event-prompt.md
      spawnPromptTemplate: .the-loop/templates/webhook-autoexecute-prompt.md
      harnessArgs:
        claude: []
        cursor: []
