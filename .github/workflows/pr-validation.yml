name: pr-validation

# Keep the release derivation trustworthy (issue #8, decision-016): the PR title
# must be a valid Conventional Commit, because merges to main are squashed and
# the title becomes the commit semantic-release later parses. Enforced with
# commitlint (off-the-shelf) — no custom linter. Installed with bun (repo
# convention, .the-loop/config.yaml).

on:
  pull_request:
    branches: [main]
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read

jobs:
  commitlint-title:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Lint PR title (conventional commits)
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: echo "$PR_TITLE" | bun run commitlint --verbose
