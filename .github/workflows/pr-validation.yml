name: pr-validation

# Keep the release derivation trustworthy (issue #8, decision-016): the PR title
# must be a valid Conventional Commit, because merges to main are squashed and
# the title becomes the commit semantic-release later parses. Enforced with
# commitlint (off-the-shelf) — no custom linter.

on:
  pull_request:
    branches: [main]
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read

jobs:
  commitlint-title:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint PR title (conventional commits)
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: echo "$PR_TITLE" | npx commitlint --verbose
